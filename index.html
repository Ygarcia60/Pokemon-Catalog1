<!doctype html>
<html>
  <head>
    <title>Pokemon Card Catalog | Home</title>
    <meta name="description" content="A Catalog of Gen 1 Pokemon Cards" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Gen 1 Pokemon Card Catalog</h1>
      <p class="subtitle">
        A Catalog of most Expensive versions of Gen 1 Pokemon Cards with search , filter, and sorting capabilities.
      </p>
    </header>

    <section class="controls">
      <input
        type="text"
        id="search-input"
        placeholder="Search for a Pokemon..."
        />

        <select id="type-filter">
          <option value="All">All Types</option>
          <option value="Fire">Fire</option>
          <option value="Water">Water</option>
          <option value="Grass">Grass</option>
          <option value="Electric">Electric</option>
          <option value="Psychic">Psychic</option>
          <option value="Fighting">Fighting</option>
          <option value="Dark">Dark</option>
          <option value="Normal">Normal</option>
        </select>

        <select id="sort-select">
          <option value="default">Sort By</option>
          <option value="name-az">Name A-Z</option>
          <option value="price-low-high">Price Low to High</option>
          <option value="price-high-low">Price High to Low</option>
        </select>
    </section>
    <button id="random-card-btn">Get Random Card</button>
    <div id="random-card-result"></div>
    <p id="results-count"></p>

    <div id="card-container"></div>
    <!-- Hidden tempate card that JS will clone -->
    <div class="card" style="display: none">
      <div class="card-content">
        <img src="" alt=""/>
        <h2> Pokemon Name</h2>
        <p>Card details go HERE</p>
      </div>
    </div>
  </body>
</html>
