<!doctype html>
<html>
  <head>
    <title>Pokemon Catalog | Home</title>
    <meta name="description" content="A Catalog of Gen 1 Pokemon Cards" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Gen 1 Pokemon</h1>
    </header>
    <div id="card-container"></div>
    <div class="card" style="display: none">
      <div class="card-content">
        <h2> Pokemon </h2>
        <img src="" alt="TV Show Poster" />
        <ul>
          <li>Bullet Point 1</li>
          <li>Bullet Point 2</li>
          <li>Bullet Point 3</li>
        </ul>
      </div>
    </div>
    <div class="footer">
      <button onclick="quoteAlert()">Get A Quote!</button>
      <button onclick="removeLastCard()">Remove A Card!</button>
    </div>
  </body>
</html>
